<section class="landing-section padding">
  <h1 class="super-title">Hi, I'm Anders</h1>
  <div class="landing-section-container">
    <div class="landing-section-top">
      <div class="audience-selector-wrapper">
        <div class="audience-selector" data-animated="true">
          <div class="audience-selector-inner">
            <button class="audience-btn active" data-audience="anyone">
              For anyone
            </button>

            <button class="audience-btn" data-audience="recruiters">
              Recruiters
            </button>

            <button class="audience-btn" data-audience="product-managers">
              Product Managers
            </button>

            <button class="audience-btn" data-audience="product-designers">
              Product Designers
            </button>

            <button class="audience-btn" data-audience="engineers">
              Engineers
            </button>
          </div>
          <div class="audience-selector-fade"></div>
        </div>
      </div>
    </div>

    <div class="landing-section-bottom audience-anyone">
      <div class="landing-section-content-container">
        <div class="dynamic-text-box">
          <h3 class="dynamic-text"></h3>
        </div>
      </div>

      <div class="landing-section-img-container">
        <img
          id="audience-image"
          src="../Images/blueGrainyBackground.jpg"
          alt=""
        />
      </div>
    </div>
  </div>
</section>
